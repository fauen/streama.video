<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Search</title>
    <style>
        :root {
            --bg: #1d2021;
            --fg: #ebdbb2;
            --fg-dim: #a89984;
            --red: #fb4934;
            --green: #b8bb26;
            --yellow: #fabd2f;
            --blue: #83a598;
            --purple: #d3869b;
            --bg-alt: #282828;
            --border: #3c3836;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 600;
            color: var(--fg);
        }

        .search-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .input-group {
            display: flex;
            gap: 1rem;
        }

        input[type="text"], select {
            padding: 0.75rem 1rem;
            border-radius: 4px;
            border: 1px solid var(--border);
            background-color: var(--bg-alt);
            color: var(--fg);
            font-size: 1rem;
            flex: 1;
            min-width: 0;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--blue);
        }

        input[type="text"]::placeholder {
            color: var(--fg-dim);
        }

        button {
            padding: 0.75rem 1.5rem;
            background-color: var(--blue);
            color: var(--bg);
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--green);
        }

        button:active {
            background-color: var(--yellow);
        }

        .results {
            margin-top: 1rem;
        }

        .result-item {
            background-color: var(--bg-alt);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-left: 3px solid var(--blue);
            transition: all 0.2s ease;
        }

        .result-item:hover {
            border-left-color: var(--green);
        }

        .result-item.unavailable {
            opacity: 0.6;
            padding: 0.75rem;
            transform: scale(0.95);
            border-left-color: var(--fg-dim);
        }

        .result-item.unavailable:hover {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .result-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--fg);
            margin-bottom: 0.5rem;
        }

        .result-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.875rem;
            color: var(--fg-dim);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--fg-dim);
        }

        .error {
            color: var(--red);
            text-align: center;
            padding: 1rem;
            background-color: rgba(251, 73, 52, 0.1);
            border-radius: 4px;
        }

        .empty {
            text-align: center;
            padding: 2rem;
            color: var(--fg-dim);
        }

        .sources {
            margin-top: 0.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .source-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.5rem;
            background-color: var(--bg);
            border-radius: 4px;
            font-size: 0.75rem;
            color: var(--fg);
            border: 1px solid var(--border);
        }

        .source-badge.sub { border-color: var(--green); color: var(--green); }
        .source-badge.purchase { border-color: var(--yellow); color: var(--yellow); }
        .source-badge.free { border-color: var(--blue); color: var(--blue); }
        .source-badge.tve { border-color: var(--purple); color: var(--purple); }

        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stream Search</h1>
        
        <div class="search-box">
            <div class="input-group">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search for a movie or TV show..."
                    autocomplete="off"
                >
                <select id="countrySelect">
                    <option value="">Select Country</option>
                    <option value="SE">Sweden</option>
                    <option value="GB">United Kingdom</option>
                    <option value="US">United States</option>
                </select>
            </div>
            <button onclick="search()">Search</button>
        </div>
        
        <div id="resultsContainer" class="results"></div>
    </div>

    <script>
        const API_KEY = 'YOUR_API_KEY'; // Replace with your actual API key
        const API_BASE = 'https://api.watchmode.com/v1';
        

        
        async function search() {
            const query = document.getElementById('searchInput').value.trim();
            const country = document.getElementById('countrySelect').value;
            
            if (!query) {
                showError('Please enter a search term');
                return;
            }
            
            if (!country) {
                showError('Please select a country');
                return;
            }
            
            showLoading();
            
            try {
                // Build search URL
                const params = new URLSearchParams({
                    search_field: 'name',
                    search_value: query
                });
                
                const response = await fetch(`${API_BASE}/search/?${params}`, {
                    headers: {
                        'X-API-Key': API_KEY
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                await displayResultsWithSources(data, country);
            } catch (error) {
                console.error('Error searching:', error);
                showError('Failed to search. Please check your API key and try again.');
            }
        }
        
        async function displayResultsWithSources(data, country) {
            const container = document.getElementById('resultsContainer');
            
            if (!data.title_results || data.title_results.length === 0) {
                container.innerHTML = '<div class="empty">No results found</div>';
                return;
            }
            
            // Display up to 10 results
            const limitedResults = data.title_results.slice(0, 10);
            
            // Fetch sources for all titles in parallel
            const titlesWithSources = await Promise.all(
                limitedResults.map(async (title) => {
                    const sources = await getSourcesForTitle(title.id, country);
                    return { ...title, sources };
                })
            );
            
            container.innerHTML = titlesWithSources.map(title => `
                <div class="result-item ${title.sources && title.sources.length > 0 ? '' : 'unavailable'}">
                    <div class="result-title">${escapeHtml(title.name)} ${title.year ? `(${title.year})` : ''}</div>
                    <div class="result-meta">
                        <span>${title.type ? title.type.replace('_', ' ') : 'N/A'}</span>
                        ${title.imdb_id ? `<span>IMDb: ${title.imdb_id}</span>` : ''}
                    </div>
                    ${renderSources(title.sources, country)}
                </div>
            `).join('');
        }
        
        async function getSourcesForTitle(titleId, country) {
            try {
                const response = await fetch(`${API_BASE}/title/${titleId}/sources/?regions=${country}`, {
                    headers: {
                        'X-API-Key': API_KEY
                    }
                });
                
                if (!response.ok) {
                    if (response.status === 404) {
                        return [];
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                return data || [];
            } catch (error) {
                console.error(`Error fetching sources for title ${titleId}:`, error);
                return [];
            }
        }
        
        function renderSources(sources, country) {
            if (!sources || sources.length === 0) {
                return '<div class="sources"><span class="empty" style="font-size: 0.875rem;">Not available in selected country</span></div>';
            }
            
            return `
                <div class="sources">
                    ${sources.map(source => `
                        <span class="source-badge ${source.type}" title="${escapeHtml(source.name)} - ${source.type}">
                            ${escapeHtml(source.name)}
                        </span>
                    `).join('')}
                </div>
            `;
        }
        
        function showLoading() {
            document.getElementById('resultsContainer').innerHTML = 
                '<div class="loading">Searching and checking availability...</div>';
        }
        
        function showError(message) {
            document.getElementById('resultsContainer').innerHTML = 
                `<div class="error">${escapeHtml(message)}</div>`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Allow Enter key to trigger search
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search();
            }
        });
    </script>
</body>
</html>
